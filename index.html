<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booster — Vision × Velocity = The Future, Delivered.</title>
<meta name="description" content="Booster — premium last mile delivery. Vision × Velocity = The Future, Delivered.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Fraunces:ital,wght@1,400;1,500;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Muted dusty peach palette */
    --peach: #e8b89c;
    --peach-deep: #d49a7a;
    --peach-soft: #f5d8c5;
    --peach-glow: #f2c4a8;
    --cream: #faeee2;
    --ink: #3d2820;          /* deep warm brown for text */
    --ink-soft: #6b4d40;
    --ink-mute: #9a7a6b;
    --line: rgba(61, 40, 32, 0.12);
    --accent: #7a2818;       /* deep oxblood — strong contrast against peach */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* BACKGROUND — layered peach gradient with depth */
  body {
    background:
      /* Soft glow top-right */
      radial-gradient(ellipse 80% 60% at 80% 20%, rgba(245, 216, 197, 0.9) 0%, transparent 60%),
      /* Soft glow bottom-left */
      radial-gradient(ellipse 70% 50% at 15% 85%, rgba(232, 184, 156, 0.7) 0%, transparent 65%),
      /* Base gradient */
      linear-gradient(135deg, #faeee2 0%, #f2c4a8 50%, #e8b89c 100%);
    position: relative;
  }

  /* Subtle grain texture for that refined, premium feel */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.4;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.24 0 0 0 0 0.16 0 0 0 0 0.13 0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  /* Decorative soft circle for visual interest */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    right: -10%;
    width: 60vh;
    height: 60vh;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245, 216, 197, 0.6) 0%, transparent 70%);
    z-index: 0;
    pointer-events: none;
    animation: float 18s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-30px, 20px) scale(1.05); }
  }

  /* CONTENT */
  .content {
    position: relative;
    z-index: 3;
    height: 100%;
    width: 100%;
    display: flex;
    flex-direction: column;
    padding: 40px 56px;
  }

  /* HEADER */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    opacity: 0;
    animation: fadeIn 1.4s ease 0.4s forwards;
  }
  .logo {
    font-family: 'Italiana', serif;
    font-weight: 400;
    font-size: 28px;
    letter-spacing: 0.04em;
    color: var(--ink);
    display: flex;
    align-items: center;
  }
  .logo .dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    margin-left: 6px;
    margin-bottom: 18px;
  }
  nav {
    display: flex;
    gap: 36px;
    align-items: center;
  }
  nav a {
    color: var(--ink-soft);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: color 0.3s ease;
    position: relative;
    padding: 4px 0;
  }
  nav a::after {
    content: '';
    position: absolute;
    left: 0; bottom: 0;
    width: 0;
    height: 1px;
    background: var(--ink);
    transition: width 0.4s ease;
  }
  nav a:hover { color: var(--ink); }
  nav a:hover::after { width: 100%; }

  /* CENTER STAGE */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 24px;
  }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 1.4s ease 0.8s forwards;
  }
  .eyebrow .line {
    width: 32px;
    height: 1px;
    background: var(--ink-mute);
  }
  h1 {
    font-family: 'Italiana', serif;
    font-weight: 400;
    font-size: clamp(28px, 5.5vw, 88px);
    line-height: 1.1;
    letter-spacing: 0.005em;
    max-width: none;
    white-space: nowrap;
    color: var(--ink);
    opacity: 0;
    animation: fadeUp 1.6s ease 1s forwards;
  }
  h1 em {
    font-style: normal;
    font-weight: 400;
    color: var(--accent);
    position: relative;
    font-family: 'Italiana', serif;
    margin: 0 0.08em;
  }
  /* Mathematical operators get their own punch — bold, weighty, slightly larger */
  h1 em.op {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-style: italic;
    font-size: 0.85em;
    margin: 0 0.18em;
    display: inline-block;
    transform: translateY(-0.05em);
    background: linear-gradient(135deg, #7a2818 0%, #b8482e 50%, #7a2818 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    animation: shimmer 4s ease-in-out infinite;
    text-shadow: 0 2px 12px rgba(122, 40, 24, 0.15);
  }
  h1 em.op:nth-of-type(2) {
    animation-delay: 0.8s;
  }
  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  /* "Delivered" stays italic Italiana but in the rich accent */
  h1 em.underline {
    font-style: italic;
    color: var(--accent);
  }
  /* Decorative underline swoosh under the highlighted word */
  h1 em.underline::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    bottom: -4px;
    height: 6px;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 8' preserveAspectRatio='none'><path d='M2 5 Q 25 1 50 4 T 98 3' stroke='%237a2818' stroke-width='1.5' fill='none' stroke-linecap='round' opacity='0.7'/></svg>") no-repeat center / 100% 100%;
  }

  .sub {
    margin-top: 36px;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--ink-soft);
    max-width: 480px;
    line-height: 1.65;
    opacity: 0;
    animation: fadeUp 1.4s ease 1.4s forwards;
  }

  /* FOOTER */
  footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    opacity: 0;
    animation: fadeIn 1.4s ease 1.8s forwards;
  }
  .meta {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-mute);
    line-height: 1.8;
  }
  .live {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(122, 40, 24, 0.5);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(122, 40, 24, 0.5); }
    70% { box-shadow: 0 0 0 10px rgba(122, 40, 24, 0); }
    100% { box-shadow: 0 0 0 0 rgba(122, 40, 24, 0); }
  }

  /* CTA — solid premium button */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 18px 32px;
    background: var(--ink);
    color: var(--cream);
    text-decoration: none;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    border-radius: 100px;
    transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    box-shadow: 0 4px 20px rgba(61, 40, 32, 0.12);
  }
  .cta:hover {
    background: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(122, 40, 24, 0.35);
  }
  .cta .arrow { transition: transform 0.4s ease; display: inline-block; }
  .cta:hover .arrow { transform: translateX(6px); }
  .hero-cta {
    margin-top: 56px;
    opacity: 0;
    animation: fadeUp 1.4s ease 1.4s forwards;
  }

  /* ANIMATIONS */
  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* RESPONSIVE */
  @media (max-width: 720px) {
    html, body { overflow-y: auto; overflow-x: hidden; }
    .content { padding: 24px; min-height: 100vh; }
    nav { gap: 18px; }
    nav a { font-size: 10px; letter-spacing: 0.12em; }
    .meta { font-size: 9px; }
    .cta { padding: 16px 24px; font-size: 11px; }
    .hero-cta { margin-top: 40px; }
    h1 { font-size: clamp(20px, 5.5vw, 38px); }
  }
</style>
</head>
<body>

<div class="content">

  <!-- HEADER -->
  <header>
    <div class="logo">Booster<span class="dot"></span></div>
    <nav>
      <a href="#about">About</a>
      <a href="#quote">Get a Quote</a>
    </nav>
  </header>

  <!-- CENTER -->
  <main>
    <h1>Vision <em class="op">×</em> Velocity <em class="op">=</em> The Future, <em class="underline">Delivered.</em></h1>
    <a href="#quote" class="cta hero-cta">Coming Soon<span class="arrow"></span></a>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="meta">
      <div class="live"><span class="live-dot"></span> Now Operating</div>
      <div>© 2026 Booster</div>
    </div>
  </footer>

</div>

<script>
  // Placeholder behaviour for the two links until you build About / Quote pages
  document.querySelectorAll('a[href="#quote"]').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      alert("Thanks for your interest in Booster.\n\nQuote form coming soon — please email system@booster.earth to get started.");
    });
  });
  document.querySelectorAll('a[href="#about"]').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      alert(
  "🚀 About Page Coming Soon!\n\n" +
  "We're currently working on our About page to give you a better experience.\n\n" +
  "If you need any help or have questions, feel free to contact us at:\n" +
  "system@booster.earth"
);
    });
  });
</script>

</body>
</html>
